<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ecom-dashboard</title>
    <script type="text/javascript">
      // 单页应用路由重定向解析脚本（修复斜杠粘连问题）
      (function(l) {
        if (l.search[0] === '?' ) {
          var s = l.search.slice(1).split('&').reduce(function(q, v) {
            var p = v.split('=');
            q[p[0]] = p.slice(1).join('=').replace(/~and~/g, '&');
            return q;
          }, {});
          if (s.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (s.p || '') +
              (s.q ? ('?' + s.q) : '') +
              l.hash
            );
          }
        }
      }(window.location));
    </script>
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
