name: Keep Supabase Alive

on:
  schedule:
    # 每天世界标准时间中午12点（北京时间晚上8点）自动运行一次
    - cron: '0 12 * * *'
  workflow_dispatch: # 允许你手动在 GitHub 页面上点击运行测试

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database API
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/products?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
